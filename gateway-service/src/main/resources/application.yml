server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

        - id: orders-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**